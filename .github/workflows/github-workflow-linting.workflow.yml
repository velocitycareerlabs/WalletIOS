name: GitHub Workflow Linting
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/**'

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Git clone repository
        uses: actions/checkout@v4
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
